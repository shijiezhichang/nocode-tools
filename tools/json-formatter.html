<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>JSON格式化工具 - 在线美化/压缩/校验JSON - 无代码工具集</title>
<meta name="description" content="免费在线JSON格式化工具，支持JSON美化、压缩、校验、语法高亮显示，一键复制结果。">
<meta name="keywords" content="JSON格式化,JSON美化,JSON校验,在线工具,开发者工具">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
header{text-align:center;padding:36px 20px 24px}
header h1{font-size:clamp(1.5rem,3.5vw,2.2rem);background:linear-gradient(90deg,#00d2ff,#7b2ff7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:0 20px 16px}
.btn{background:rgba(123,47,247,.3);border:1px solid rgba(123,47,247,.5);color:#d4b5ff;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:.9rem;transition:all .2s}
.btn:hover{background:rgba(123,47,247,.5);color:#fff}
.btn.active{background:rgba(0,210,255,.3);border-color:#00d2ff;color:#00d2ff}
.container{max-width:1100px;margin:0 auto;padding:0 20px 32px;width:100%;flex:1}
.panes{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.pane{display:flex;flex-direction:column}
.pane label{font-size:.85rem;color:#aaa;margin-bottom:6px;padding-left:4px}
textarea,.result-box{width:100%;flex:1;min-height:350px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:16px;color:#c8f7c5;font-family:'Fira Code','Cascadia Code',Consolas,monospace;font-size:.88rem;resize:vertical;line-height:1.6}
textarea:focus{outline:none;border-color:rgba(123,47,247,.6)}
.result-box{overflow-y:auto;white-space:pre-wrap;word-break:break-all}
.status-bar{text-align:center;padding:10px;font-size:.9rem;min-height:40px}
.status-bar.error{color:#ff6b6b}
.status-bar.success{color:#51cf66}
.copy-btn{position:relative}
.copy-toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,210,255,.9);color:#000;padding:10px 24px;border-radius:8px;font-size:.9rem;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.copy-toast.show{opacity:1}
footer{border-top:1px solid rgba(255,255,255,.08);padding:24px 20px}
.cross-links,.tools-links{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:14px}
.cross-links a,.tools-links a{color:#aaa;text-decoration:none;font-size:.88rem;background:rgba(255,255,255,.05);padding:5px 12px;border-radius:18px;transition:all .2s}
.cross-links a:hover{background:rgba(123,47,247,.3);color:#fff}
.tools-links a{color:#00d2ff;background:rgba(0,210,255,.1)}
.tools-links a:hover{background:rgba(0,210,255,.25)}
.copyright{text-align:center;color:#666;font-size:.82rem}
.json-key{color:#7b8cff}
.json-string{color:#c8f7c5}
.json-number{color:#ffd43b}
.json-bool{color:#ff9e64}
.json-null{color:#868e96}
@media(max-width:768px){.panes{grid-template-columns:1fr}.pane{min-height:250px}textarea,.result-box{min-height:250px}}
</style>
</head>
<body>
<header><h1>{ } JSON 格式化工具</h1></header>
<div class="toolbar">
<button class="btn" onclick="formatJSON()">✨ 格式化</button>
<button class="btn" onclick="minifyJSON()">📦 压缩</button>
<button class="btn" onclick="copyResult()">📋 复制结果</button>
<button class="btn" onclick="clearAll()">🗑️ 清空</button>
</div>
<div class="container">
<div class="status-bar" id="status"></div>
<div class="panes">
<div class="pane">
<label>输入 JSON</label>
<textarea id="input" placeholder='粘贴您的 JSON 数据，例如：&#10;{"name":"JSON格式化工具","version":"1.0"}'></textarea>
</div>
<div class="pane">
<label>输出结果</label>
<div class="result-box" id="output"></div>
</div>
</div>
</div>
<div class="copy-toast" id="toast">已复制到剪贴板！</div>
<footer>
<div class="tools-links">

</div>

</div>
<p class="copyright">© 2025 AI站群旗下站点</p>
</footer>
<script>
const input=document.getElementById('input'),output=document.getElementById('output'),status=document.getElementById('status');
function setStatus(msg,type){status.textContent=msg;status.className='status-bar'+(type?' '+type:'')}
function highlightJSON(str){return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,function(m){let c='json-number';if(/^"/.test(m)){c=/:$/.test(m)?'json-key':'json-string'}else if(/true|false/.test(m))c='json-bool';else if(/null/.test(m))c='json-null';return'<span class="'+c+'">'+m+'</span>'})}
function formatJSON(){try{const obj=JSON.parse(input.value);output.innerHTML=highlightJSON(JSON.stringify(obj,null,2));setStatus('✅ JSON 有效','success')}catch(e){setStatus('❌ '+e.message,'error');output.textContent=''}}
function minifyJSON(){try{const obj=JSON.parse(input.value);output.textContent=JSON.stringify(obj);setStatus('✅ 压缩成功','success')}catch(e){setStatus('❌ '+e.message,'error')}}
function copyResult(){const text=output.textContent||output.innerText;if(!text)return;setStatus('','');navigator.clipboard.writeText(text).then(()=>{const t=document.getElementById('toast');t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)})}
function clearAll(){input.value='';output.innerHTML='';setStatus('','')}
</script>
</body>
</html>
