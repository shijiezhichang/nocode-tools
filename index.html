<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoCode 工具导航</title>
    <meta name="description" content="精选无代码工具集合，帮助你零代码搭建产品。">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 2rem; max-width: 600px; }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 1.1rem; color: #888; margin: 0 auto 2rem; line-height: 1.6; }
        .badge { display: inline-block; padding: 0.5rem 1rem; background: rgba(0,210,255,0.2); border: 1px solid #00d2ff; border-radius: 2rem; font-size: 0.9rem; color: #00d2ff; }
        .topics { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-top: 2rem; }
        .topic { padding: 0.4rem 0.8rem; background: rgba(255,255,255,0.05); border-radius: 1rem; font-size: 0.85rem; color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NoCode 工具导航</h1>
        <p>精选无代码工具集合，帮助你零代码搭建产品。</p>
        <span class="badge">🚀 Coming Soon</span>
        <div class="topics">
            <span class="topic">🌐 建站</span>
            <span class="topic">📊 数据库</span>
            <span class="topic">🤖 自动化</span>
            <span class="topic">📱 App</span>
        </div>
    </div>
</body>
</html>
